<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <radialGradient id="blob-lime" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-pink" cx="0.85" cy="0.2" r="0.4">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-blue" cx="0.7" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#3290ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3290ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3290ff" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#blob-lime)"/>
  <rect width="1200" height="630" fill="url(#blob-pink)"/>
  <rect width="1200" height="630" fill="url(#blob-blue)"/>

  <!-- Logo mark (sticker) -->
  <g transform="translate(100, 105)">
    <!-- Sticker shadow -->
    <rect x="6" y="6" width="100" height="100" rx="24" fill="#0f172a" opacity="0.95"/>
    <!-- Sticker face -->
    <rect x="0" y="0" width="100" height="100" rx="24" fill="#a3e635" stroke="#0f172a" stroke-width="5"/>
    <!-- Division symbol -->
    <circle cx="50" cy="28" r="8" fill="#0f172a"/>
    <rect x="20" y="45" width="60" height="10" rx="5" fill="#0f172a"/>
    <circle cx="50" cy="72" r="8" fill="#0f172a"/>
  </g>

  <!-- Wordmark next to logo -->
  <text x="240" y="180" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#0f172a" letter-spacing="-2.8">
    calc<tspan fill="#1b73f5">tube</tspan>
  </text>

  <!-- Main headline -->
  <text x="100" y="320" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="100" font-weight="800" fill="#0f172a" letter-spacing="-4.2">
    Every calc.
  </text>
  <text x="100" y="430" font-family="Inter Tight, Inter, system-ui, sans-serif" font-size="100" font-weight="800" letter-spacing="-4.2">
    <tspan fill="#1b73f5">One tap.</tspan>
    <tspan fill="#0f172a"> Done.</tspan>
  </text>

  <!-- Subhead -->
  <text x="100" y="495" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#52525b">
    100+ free calculators · No signup · Free forever
  </text>

  <!-- Sticker chip: ✨ Trending -->
  <g transform="translate(100, 535)">
    <rect x="0" y="0" width="170" height="50" rx="25" fill="#a3e635" stroke="#0f172a" stroke-width="3"/>
    <rect x="3" y="3" width="170" height="50" rx="25" fill="#0f172a" opacity="0.95" transform="translate(0,0)"/>
    <rect x="0" y="0" width="170" height="50" rx="25" fill="#a3e635" stroke="#0f172a" stroke-width="3"/>
    <text x="20" y="32" font-family="Inter Tight, Inter, sans-serif" font-size="18" font-weight="800" fill="#0f172a">✨ 25+ TOOLS</text>
  </g>

  <!-- Sticker chip: Free forever -->
  <g transform="translate(290, 535)">
    <rect x="3" y="3" width="220" height="50" rx="25" fill="#0f172a" opacity="0.95"/>
    <rect x="0" y="0" width="220" height="50" rx="25" fill="#ec4899" stroke="#0f172a" stroke-width="3"/>
    <text x="20" y="32" font-family="Inter Tight, Inter, sans-serif" font-size="18" font-weight="800" fill="#ffffff">💸 FREE FOREVER</text>
  </g>

  <!-- Sticker chip: No signups -->
  <g transform="translate(530, 535)">
    <rect x="3" y="3" width="200" height="50" rx="25" fill="#0f172a" opacity="0.95"/>
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#fde047" stroke="#0f172a" stroke-width="3"/>
    <text x="20" y="32" font-family="Inter Tight, Inter, sans-serif" font-size="18" font-weight="800" fill="#0f172a">🚫 NO SIGNUPS</text>
  </g>

  <!-- Floating decoration: sparkle -->
  <text x="1050" y="160" font-size="80" transform="rotate(15 1050 160)">✨</text>

  <!-- Floating decoration: lightning -->
  <text x="1080" y="380" font-size="60" transform="rotate(-12 1080 380)">⚡</text>

  <!-- URL footer -->
  <text x="100" y="610" font-family="Inter, monospace" font-size="22" font-weight="600" fill="#71717a" letter-spacing="-0.5">
    calctube.com
  </text>

  <!-- Right side: floating sticker calculator preview -->
  <g transform="translate(820, 200) rotate(-4)">
    <!-- Calculator card shadow -->
    <rect x="8" y="8" width="240" height="280" rx="22" fill="#0f172a" opacity="0.95"/>
    <!-- Calculator card body -->
    <rect x="0" y="0" width="240" height="280" rx="22" fill="#ffffff" stroke="#0f172a" stroke-width="4"/>
    <!-- Calculator header -->
    <rect x="0" y="0" width="240" height="56" rx="22" fill="#1b73f5"/>
    <rect x="0" y="34" width="240" height="22" fill="#1b73f5"/>
    <text x="20" y="35" font-family="Inter Tight, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Mortgage</text>
    <!-- Display row -->
    <rect x="16" y="76" width="208" height="44" rx="10" fill="#eef7ff"/>
    <text x="200" y="106" text-anchor="end" font-family="Inter, monospace" font-size="22" font-weight="700" fill="#1b73f5">$1,996/mo</text>
    <!-- Slider rows -->
    <rect x="16" y="138" width="208" height="10" rx="5" fill="#e4e4e7"/>
    <rect x="16" y="138" width="120" height="10" rx="5" fill="#a3e635"/>
    <circle cx="136" cy="143" r="9" fill="#0f172a"/>
    <rect x="16" y="170" width="208" height="10" rx="5" fill="#e4e4e7"/>
    <rect x="16" y="170" width="160" height="10" rx="5" fill="#1b73f5"/>
    <circle cx="176" cy="175" r="9" fill="#0f172a"/>
    <rect x="16" y="202" width="208" height="10" rx="5" fill="#e4e4e7"/>
    <rect x="16" y="202" width="80" height="10" rx="5" fill="#ec4899"/>
    <circle cx="96" cy="207" r="9" fill="#0f172a"/>
    <!-- Bottom button -->
    <rect x="16" y="232" width="208" height="32" rx="16" fill="#a3e635" stroke="#0f172a" stroke-width="3"/>
    <text x="120" y="253" text-anchor="middle" font-family="Inter Tight, sans-serif" font-size="14" font-weight="800" fill="#0f172a">Calculate →</text>
  </g>
</svg>
